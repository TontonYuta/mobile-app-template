<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AOF Math Tutor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
              serif: ['Merriweather', 'ui-serif', 'Georgia', 'Cambria', 'Times New Roman', 'Times', 'serif'],
            },
            colors: {
              aof: {
                blue: '#0054a6', // Example AOF brand color
                red: '#d71920',
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap&subset=vietnamese" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <style>
      :root {
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --font-serif: 'Merriweather', Georgia, serif;
      }
      body {
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-serif);
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Markdown Styles */
      .markdown-body {
        color: inherit; /* Allow color inheritance */
      }
      .markdown-body p {
        margin-bottom: 1.25em;
        line-height: 1.75;
        color: inherit; /* Inherit from parent */
      }
      .markdown-body ul, .markdown-body ol {
        margin-bottom: 1.25em;
        padding-left: 1.5em;
        color: inherit;
      }
      .markdown-body ul {
        list-style-type: disc;
      }
      .markdown-body ol {
        list-style-type: decimal;
      }
      .markdown-body li {
        margin-bottom: 0.5em;
        padding-left: 0.25em;
      }
      .markdown-body strong {
        font-weight: 600;
        color: inherit; /* Inherit to work on dark backgrounds */
      }
      
      /* Katex Adjustments */
      .katex {
        font-size: 1.1em !important;
        line-height: 1.2;
        text-rendering: auto;
      }
      .katex-display {
        margin: 1.5em 0 !important;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.75em 0;
        -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        text-align: center;
        max-width: 100%;
      }
      /* Ensure fractions and integrals look good */
      .katex .base {
        margin-top: 2px;
      }
      /* Fix horizontal scrollbar on mobile for long equations */
      .katex-html {
        overflow-x: auto;
        overflow-y: hidden;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
    "rehype-katex": "https://aistudiocdn.com/rehype-katex@^7.0.1",
    "remark-math": "https://aistudiocdn.com/remark-math@^6.0.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 antialiased selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
